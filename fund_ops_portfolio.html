<!doctype html><html><meta charset="utf-8"><title>Portfolio Close</title><link rel="stylesheet" href="fund_ops.css"><body data-page="portfolio"><main class="shell"><header class="top"><div class="brand">Fund Operations Cockpit</div><nav id="nav" class="nav"></nav></header><h1>Portfolio Close & Track Record</h1><p id="state" class="state">Loading…</p><section id="metrics" class="grid"></section></main><script src="fund_ops_ui.js"></script><script>report().then(r=>{setState(r);metrics.innerHTML=[['NAV proxy',Number(r.net_pnl)+Number(r.reporting_cash_balance)],['Net P/L',r.net_pnl],['Close status',r.status],['Exceptions',r.reconciliation_exceptions.length]].map(([k,v])=>`<article class="card"><span class="metric">${k}</span><strong class="value">${esc(v)}</strong></article>`).join('')}).catch(()=>state.textContent='No daily-close report found.')</script></body></html>
