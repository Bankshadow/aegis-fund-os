<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fund Ops — Dashboard</title><link rel="stylesheet" href="fund_ops.css"><body data-page="dashboard"><main class="shell"><header class="top"><div><div class="brand">Fund Operations Cockpit</div><div class="sub">Read-only operations MVP</div></div><nav id="nav" class="nav"></nav></header><h1>Dashboard</h1><p id="state" class="state">Loading daily-close report…</p><section id="metrics" class="grid"></section><section class="section"><h2>Open positions</h2><table><thead><tr><th>Instrument</th><th>Quantity</th><th>Mark</th><th>Unrealized P/L</th></tr></thead><tbody id="positions"></tbody></table></section></main><script src="fund_ops_ui.js"></script><script>report().then(r=>{setState(r);const m=[['Net P/L',r.net_pnl],['Reporting cash',r.reporting_cash_balance],['Realized gross',r.realized_gross_pnl],['Unrealized gross',r.unrealized_gross_pnl],['Fees',-r.trade_fees],['Carry',r.carry_pnl]];metrics.innerHTML=m.map(([k,v])=>`<article class="card"><span class="metric">${k}</span><strong class="value">${num(v)}</strong></article>`).join('');positions.innerHTML=r.positions.map(p=>row([esc(p.instrument),num(p.quantity),p.market_price===null?'—':num(p.market_price),num(p.unrealized_gross_pnl)])).join('')||empty(positions,4,'No open positions');}).catch(()=>state.textContent='No daily-close report found. Run the read-only daily-close command first.');</script></body></html>
