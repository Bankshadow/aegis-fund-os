<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fund Ops — Reconciliation</title><link rel="stylesheet" href="fund_ops.css"><body data-page="reconciliation"><main class="shell"><header class="top"><div><div class="brand">Fund Operations Cockpit</div><div class="sub">Read-only operations MVP</div></div><nav id="nav" class="nav"></nav></header><h1>Reconciliation & Reports</h1><p id="state" class="state">Loading control status…</p><section id="summary" class="grid"></section><section class="section"><h2>Open exceptions</h2><table><thead><tr><th>Asset</th><th>Expected</th><th>Observed</th><th>Difference</th><th>Reason</th></tr></thead><tbody id="exceptions"></tbody></table></section></main><script src="fund_ops_ui.js"></script><script>report().then(r=>{setState(r);summary.innerHTML=[['Close status',r.status],['Report date',r.report_date],['Net P/L',num(r.net_pnl)],['Exceptions',r.reconciliation_exceptions.length]].map(([k,v])=>`<article class="card"><span class="metric">${k}</span><strong class="value">${esc(v)}</strong></article>`).join('');exceptions.innerHTML=r.reconciliation_exceptions.map(e=>row([esc(e.asset),num(e.expected),num(e.observed),num(e.difference),esc(e.reason)])).join('')||empty(exceptions,5,'No open exceptions — reconciliation is clean.');}).catch(()=>state.textContent='No daily-close report found.');</script></body></html>
