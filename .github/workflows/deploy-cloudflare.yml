name: Deploy Aegis Fund OS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BINANCE_TESTNET_API_KEY: ${{ secrets.BINANCE_TESTNET_API_KEY }}
      BINANCE_TESTNET_API_SECRET: ${{ secrets.BINANCE_TESTNET_API_SECRET }}
    defaults:
      run:
        working-directory: fund-command-center-local
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify frontend checks
        run: |
          pnpm run test:binance
          pnpm run test:daily-close

      - name: Build Worker
        run: pnpm run build

      - name: Report pending deployment credentials
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' || env.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "::warning::Cloudflare deployment skipped until CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID are configured."

      - name: Apply D1 migrations
        if: ${{ env.CLOUDFLARE_D1_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
        run: pnpm exec wrangler d1 migrations apply GOVERNANCE_DB --remote

      # Without a dedicated D1 token this step used to be skipped silently, which
      # let schema drift behind a deploy. Fall back to the deploy token, but keep
      # it non-fatal: a permissions gap must not block a release, and the app
      # tolerates a pending migration. The warning makes the drift visible.
      - name: Apply D1 migrations (fallback to deploy token)
        if: ${{ env.CLOUDFLARE_D1_API_TOKEN == '' && env.CLOUDFLARE_API_TOKEN != '' }}
        continue-on-error: true
        run: |
          pnpm exec wrangler d1 migrations apply GOVERNANCE_DB --remote \
            || echo "::warning::D1 migrations were not applied automatically. Apply them manually or add CLOUDFLARE_D1_API_TOKEN."

      - name: Deploy Worker
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: fund-command-center-local
          command: --cwd .output/server deploy --config wrangler.json

      - name: Configure Binance Spot Testnet secrets
        if: ${{ env.BINANCE_TESTNET_API_KEY != '' && env.BINANCE_TESTNET_API_SECRET != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: fund-command-center-local
          command: --cwd .output/server deploy --config wrangler.json
          secrets: |
            BINANCE_TESTNET_API_KEY
            BINANCE_TESTNET_API_SECRET
