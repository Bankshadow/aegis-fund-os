<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fund Ops — Ledger</title><link rel="stylesheet" href="fund_ops.css"><body data-page="ledger"><main class="shell"><header class="top"><div><div class="brand">Fund Operations Cockpit</div><div class="sub">Read-only operations MVP</div></div><nav id="nav" class="nav"></nav></header><h1>Ledger</h1><p id="state" class="state">Loading source-backed events…</p><section class="section"><h2>Append-only financial events</h2><table><thead><tr><th>Time</th><th>Type</th><th>Instrument</th><th>Side</th><th>Quantity</th><th>Price</th><th>Fee</th><th>Source</th></tr></thead><tbody id="events"></tbody></table></section></main><script src="fund_ops_ui.js"></script><script>report().then(r=>{setState(r);events.innerHTML=r.ledger_events.map(e=>row([esc(e.occurred_at),`<span class="tag">${esc(e.event_type)}</span>`,esc(e.instrument),esc(e.side),num(e.quantity),num(e.price),num(e.fee),esc(e.source_ref||e.external_id)])).join('')||empty(events,8,'No ledger events in this daily close');}).catch(()=>state.textContent='No daily-close report found.');</script></body></html>
