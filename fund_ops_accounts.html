<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fund Ops — Accounts</title><link rel="stylesheet" href="fund_ops.css"><body data-page="accounts"><main class="shell"><header class="top"><div><div class="brand">Fund Operations Cockpit</div><div class="sub">Read-only operations MVP</div></div><nav id="nav" class="nav"></nav></header><h1>Accounts & Platforms</h1><p id="state" class="state">Loading account snapshot…</p><section id="account" class="grid"></section><section class="section"><h2>Platform balances</h2><table><thead><tr><th>Asset</th><th>Total</th><th>Available</th></tr></thead><tbody id="balances"></tbody></table></section></main><script src="fund_ops_ui.js"></script><script>report().then(r=>{setState(r);account.innerHTML=[['Platform',r.platform||'—'],['Account',r.account_id||'—'],['Data freshness',r.data_as_of||'—'],['Reconciliation',r.status]].map(([k,v])=>`<article class="card"><span class="metric">${k}</span><strong class="value">${esc(v)}</strong></article>`).join('');balances.innerHTML=r.balances.map(b=>row([esc(b.asset),num(b.total),num(b.available)])).join('')||empty(balances,3,'No platform balances in this daily close');}).catch(()=>state.textContent='No daily-close report found.');</script></body></html>
